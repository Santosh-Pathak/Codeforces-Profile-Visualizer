version: "3.9"

services:
  # ── Production: built static files served by nginx ──────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: codeforces-profile-visualizer:latest
    container_name: cf-visualizer
    ports:
      - "8080:80"
    restart: unless-stopped
    profiles:
      - prod

  # ── Development: Vite dev server with hot-reload ─────────────────────────
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: codeforces-profile-visualizer:dev
    container_name: cf-visualizer-dev
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot-reload; keep node_modules from container
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    profiles:
      - dev
